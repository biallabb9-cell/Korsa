<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korsa Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2230;--border:#253044;
  --accent:#f97316;--accent-d:#c2500a;
  --text:#e6edf3;--muted:#7d8590;--white:#fff;
  --success:#22c55e;--danger:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;padding-bottom:4rem;}

/* LOCK */
.lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.lock-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:2.5rem 1.75rem;width:100%;max-width:360px;text-align:center;position:relative;overflow:hidden;}
.lock-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.lock-icon{font-size:3rem;margin-bottom:1rem;}
.lock-title{font-size:1.3rem;font-weight:900;color:var(--white);margin-bottom:0.4rem;}
.lock-sub{color:var(--muted);font-size:0.85rem;font-family:'Tajawal',sans-serif;margin-bottom:1.75rem;}
.lock-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:3px;margin-bottom:0.75rem;transition:border 0.2s;}
.lock-input:focus{border-color:var(--accent);}
.lock-err{color:var(--danger);font-size:0.8rem;margin-bottom:0.75rem;min-height:18px;font-family:'Tajawal',sans-serif;}
.lock-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#000;border:none;padding:13px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake 0.4s ease;}

/* HEADER */
.hdr{background:rgba(13,17,23,0.97);border-bottom:1px solid var(--border);padding:0.85rem 1rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-ic{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-d));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-name{font-size:1.4rem;font-weight:900;color:var(--white);letter-spacing:-1px;}
.brand-name span{color:var(--accent);}
.brand-sub{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.admin-badge{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:5px 12px;border-radius:100px;font-size:0.7rem;font-weight:700;cursor:pointer;}

/* MAIN */
main{padding:1rem;max-width:600px;margin:0 auto;}

/* ADD FORM */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.25rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.form-title{font-size:0.9rem;font-weight:700;color:var(--white);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.form-title-ic{width:30px;height:30px;background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:0.85rem;}
label{font-size:0.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
select,input[type=text],input[type=tel]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:0.9rem;outline:none;width:100%;transition:border 0.2s;}
select:focus,input:focus{border-color:var(--accent);}
select option{background:var(--surface);}
input::placeholder{color:var(--muted);opacity:0.5;}

.btn-add{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#000;border:none;padding:12px;border-radius:11px;font-family:'Cairo',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px rgba(249,115,22,0.25);}
.btn-add:active{transform:scale(0.98);}

/* VEHICLE LIST */
.vcard{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:0.85rem;overflow:hidden;}
.vh{display:flex;align-items:center;gap:0;cursor:pointer;}
.vh-img{width:80px;height:60px;object-fit:cover;flex-shrink:0;}
.vh-body{flex:1;padding:0.75rem 0.85rem;display:flex;align-items:center;justify-content:space-between;}
.vh-name{font-size:0.9rem;font-weight:900;color:var(--white);}
.vh-cnt{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.vh-arr{color:var(--accent);font-size:20px;transition:transform 0.25s;}
.vcard.open .vh-arr{transform:rotate(90deg);}

.entries{display:none;border-top:1px solid var(--border);padding:0.75rem 1rem;}
.vcard.open .entries{display:block;}

.hood-section{margin-bottom:0.75rem;}
.hood-section:last-child{margin-bottom:0;}
.hood-title{font-size:0.68rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.45rem;display:flex;align-items:center;gap:5px;}
.hood-title::before{content:'';width:3px;height:11px;background:var(--accent);border-radius:2px;display:inline-block;}

.entry-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(37,48,68,0.4);}
.entry-row:last-child{border-bottom:none;}
.en{font-size:0.82rem;font-weight:700;color:var(--text);}
.ep{font-size:0.8rem;color:var(--accent);font-family:'Tajawal',sans-serif;direction:ltr;display:inline-block;}
.btn-del{width:28px;height:28px;border-radius:7px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:#f87171;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.no-data{text-align:center;padding:1.25rem;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:0.82rem;opacity:0.6;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-right:3px solid var(--success);color:var(--text);padding:11px 20px;border-radius:12px;font-size:0.85rem;font-weight:600;z-index:999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* STATS */
.stats{display:flex;gap:0.55rem;margin-bottom:1.25rem;}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0.7rem 0.4rem;text-align:center;}
.sn{font-size:1.3rem;font-weight:900;color:var(--accent);font-family:'Tajawal',sans-serif;line-height:1;}
.sl{font-size:0.58rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px;}
</style>
</head>
<body>

<!-- LOCK -->
<div class="lock" id="lock">
  <div class="lock-box" id="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">لوحة التحكم</div>
    <div class="lock-sub">أدخل كلمة السر للدخول</div>
    <input type="password" class="lock-input" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
    <div class="lock-err" id="lock-err"></div>
    <button class="lock-btn" onclick="unlock()">🔓 دخول</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="brand-ic">🚛</div>
      <div>
        <div class="brand-name">K<span>o</span>rsa</div>
        <div class="brand-sub">لوحة التحكم</div>
      </div>
    </div>
    <span class="admin-badge" onclick="logout()">🔒 خروج</span>
  </div>
</div>

<main>
  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="sn" id="s1">0</div><div class="sl">إجمالي</div></div>
    <div class="stat"><div class="sn" id="s2">12</div><div class="sl">مركبة</div></div>
    <div class="stat"><div class="sn" id="s3">6</div><div class="sl">حي</div></div>
  </div>

  <!-- ADD FORM -->
  <div class="form-card">
    <div class="form-title"><div class="form-title-ic">➕</div> إضافة رقم جديد</div>
    <div class="fg">
      <label>نوع المركبة *</label>
      <select id="fVehicle">

        <option value="h100">H100</option>
        <option value="lourd">شاحنة وزن ثقيل</option>
        <option value="beton">شاحنة خلط الخرسانة</option>
        <option value="betonniere">Bétonnière</option>
        <option value="shackman">شاك مان</option>
        <option value="boukla">بوكلا</option>
        <option value="clark">كلارك</option>
        <option value="rafea">رافعة</option>
        <option value="jac">جاك JAC</option>
        <option value="jarrar">جرار</option>
      </select>
    </div>
    <div class="fg">
      <label>الحي *</label>
      <select id="fHood">
        <option value="">— اختر الحي —</option>
        <option>حي الشفاه</option>
        <option>حي النصر</option>
        <option>حي حمادة</option>
        <option>حي 250</option>
        <option>حي عين فوليس</option>
        <option>حي السطو</option>
      </select>
    </div>
    <div class="fg">
      <label>الاسم *</label>
      <input type="text" id="fName" placeholder="اسم صاحب المركبة">
    </div>
    <div class="fg">
      <label>رقم الهاتف *</label>
      <input type="tel" id="fPhone" placeholder="0550000000" style="direction:ltr;text-align:right;">
    </div>
    <button class="btn-add" onclick="addEntry()">✚ إضافة للسجل</button>
  </div>

  <!-- VEHICLE LIST -->
  <div id="vlist"></div>
</main>

<div class="toast" id="toast"></div>

const STORAGE_KEY = 'korsa_data_v1';

let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let openCards = new Set();

// Init data structure
VEHICLES_ORDER.forEach(v => {
  if (!data[v]) data[v] = {};
  HOODS.forEach(h => { if (!data[v][h]) data[v][h] = []; });
});

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function unlock(){
  if(document.getElementById('pwd').value === PASSWORD){
    document.getElementById('lock').style.display='none';
    render();
  } else {
    document.getElementById('lock-err').textContent='❌ كلمة السر غير صحيحة';
    const b=document.getElementById('lock-box');
    b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake');
    document.getElementById('pwd').value='';
  }
}

function logout(){
  document.getElementById('lock').style.display='flex';
  document.getElementById('pwd').value='';
  document.getElementById('lock-err').textContent='';
}

function toast(msg, ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderRightColor=ok?'var(--success)':'var(--danger)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function addEntry(){
  const v=document.getElementById('fVehicle').value;
  const h=document.getElementById('fHood').value;
  const n=document.getElementById('fName').value.trim();
  const p=document.getElementById('fPhone').value.trim();
  if(!v){toast('⚠️ اختر المركبة',false);return;}
  if(!h){toast('⚠️ اختر الحي',false);return;}
  if(!n){toast('⚠️ أدخل الاسم',false);return;}
  if(!p){toast('⚠️ أدخل رقم الهاتف',false);return;}
  if(data[v][h].length>=50){toast('⚠️ وصلت الحد الأقصى 50 رقم',false);return;}
  data[v][h].push({name:n, phone:p, id:Date.now()});
  save(); render();
  toast(`✅ تم إضافة ${n} بنجاح!`);
  document.getElementById('fName').value='';
  document.getElementById('fPhone').value='';
}

function delEntry(v,h,id){
  if(!confirm('حذف هذا الرقم؟'))return;
  data[v][h]=data[v][h].filter(e=>e.id!==id);
  save(); render();
  toast('🗑️ تم الحذف');
}

function toggle(id){
  if(openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  render();
}

function render(){
  let total=0;
  VEHICLES_ORDER.forEach(v=>HOODS.forEach(h=>total+=data[v][h].length));
  document.getElementById('s1').textContent=total;

  const vlist=document.getElementById('vlist');
  vlist.innerHTML=VEHICLES_ORDER.map(v=>{
    const vTotal=HOODS.reduce((s,h)=>s+data[v][h].length,0);
    const isOpen=openCards.has(v);
    return `
    <div class="vcard${isOpen?' open':''}" id="vc-${v}">
      <div class="vh" onclick="toggle('${v}')">
        <img class="vh-img" src="${IMGS[v]||''}" alt="${VEHICLE_NAMES[v]}">
        <div class="vh-body">
          <div>
            <div class="vh-name">${VEHICLE_NAMES[v]}</div>
            <div class="vh-cnt">${vTotal} رقم مسجّل</div>
          </div>
          <span class="vh-arr">›</span>
        </div>
      </div>
      <div class="entries">
        ${HOODS.map(h=>{
          const arr=data[v][h];
          if(!arr.length) return '';
          return `<div class="hood-section">
            <div class="hood-title">📍 ${h} (${arr.length})</div>
            ${arr.map(e=>`
              <div class="entry-row">
                <div>
                  <div class="en">${e.name}</div>
                  <div class="ep">${e.phone}</div>
                </div>
                <button class="btn-del" onclick="delEntry('${v}','${h}',${e.id})">🗑️</button>
              </div>`).join('')}
          </div>`;
        }).join('') || '<div class="no-data">لا توجد أرقام بعد</div>'}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('lock').style.display='flex';
render();
</script>
</body>
</html>
