<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korsa — دليل المركبات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2230;--border:#253044;
  --accent:#f97316;--accent-d:#c2500a;--accent-l:rgba(249,115,22,0.1);
  --text:#e6edf3;--muted:#7d8590;--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;padding-bottom:5rem;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(249,115,22,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.025) 1px,transparent 1px);
  background-size:44px 44px;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(13,17,23,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);padding:0.85rem 1rem;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-ic{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent-d));border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(249,115,22,0.35);}
.brand-name{font-size:1.7rem;font-weight:900;color:var(--white);letter-spacing:-1.5px;line-height:1;}
.brand-name span{color:var(--accent);}
.brand-sub{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
.live{display:flex;align-items:center;gap:5px;background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.25);color:#4ade80;padding:5px 12px;border-radius:100px;font-size:0.68rem;font-weight:700;}
.ldot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pu 1.5s ease infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:0.4}}
.srch{position:relative;}
.srch input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 40px 10px 14px;border-radius:11px;font-family:'Cairo',sans-serif;font-size:0.87rem;outline:none;transition:border 0.2s;}
.srch input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,0.07);}
.srch input::placeholder{color:var(--muted);opacity:0.6;}
.srch-ic{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px;}

/* HOOD CHIPS */
.hoods{padding:0.7rem 1rem 0.2rem;display:flex;gap:0.4rem;overflow-x:auto;scrollbar-width:none;}
.hoods::-webkit-scrollbar{display:none;}
.hchip{flex-shrink:0;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);padding:6px 13px;border-radius:100px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Cairo',sans-serif;white-space:nowrap;}
.hchip.on{background:rgba(249,115,22,0.12);border-color:var(--accent);color:var(--accent);}

/* STATS */
.stats{display:flex;gap:0.55rem;padding:0.7rem 1rem 0.1rem;}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:0.7rem 0.4rem;text-align:center;}
.sn{font-size:1.4rem;font-weight:900;color:var(--accent);font-family:'Tajawal',sans-serif;line-height:1;}
.sl{font-size:0.58rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-top:2px;}

.sec{padding:1rem 1rem 0.55rem;font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;position:relative;z-index:1;}

/* VEHICLE CARDS */
.vlist{padding:0 1rem;display:flex;flex-direction:column;gap:1rem;position:relative;z-index:1;}
.vcard{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:up 0.3s ease forwards;opacity:0;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* vehicle header */
.vh{display:flex;align-items:center;gap:0;cursor:pointer;user-select:none;overflow:hidden;}

.vh-img-wrap{width:110px;height:80px;flex-shrink:0;overflow:hidden;position:relative;}
.vh-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
.vcard:hover .vh-img-wrap img{transform:scale(1.05);}
.vh-img-wrap::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent 60%,var(--card));}

.vh-body{flex:1;padding:0.85rem 0.85rem 0.85rem 0.5rem;display:flex;align-items:center;justify-content:space-between;min-width:0;}
.vh-name{font-size:1rem;font-weight:900;color:var(--white);}
.vh-count{font-size:0.7rem;color:var(--muted);font-family:'Tajawal',sans-serif;margin-top:3px;}
.vh-arrow{color:var(--accent);font-size:22px;font-weight:900;transition:transform 0.25s;flex-shrink:0;margin-right:4px;}
.vcard.open .vh-arrow{transform:rotate(90deg);}

/* contacts panel */
.contacts{display:none;padding:0.75rem 1rem 1rem;border-top:1px solid var(--border);}
.vcard.open .contacts{display:block;}

.hgroup{margin-bottom:0.85rem;}
.hgroup:last-child{margin-bottom:0;}
.hg-title{font-size:0.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.5rem;display:flex;align-items:center;gap:6px;}
.hg-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;}

.phone-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(37,48,68,0.5);}
.phone-row:last-child{border-bottom:none;}
.pr-name{font-size:0.82rem;font-weight:700;color:var(--text);}
.pr-num{font-size:0.82rem;color:var(--accent);font-family:'Tajawal',sans-serif;direction:ltr;display:inline-block;}
.call-btn{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;border:none;padding:7px 13px;border-radius:9px;font-family:'Cairo',sans-serif;font-size:0.76rem;font-weight:700;text-decoration:none;cursor:pointer;box-shadow:0 3px 10px rgba(249,115,22,0.25);transition:transform 0.15s;white-space:nowrap;}
.call-btn:active{transform:scale(0.96);}

.no-phones{text-align:center;padding:1.5rem;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:0.85rem;}
.no-phones span{font-size:1.8rem;display:block;margin-bottom:0.4rem;opacity:0.3;}

.empty{text-align:center;padding:4rem 2rem;color:var(--muted);position:relative;z-index:1;}
.ei{font-size:3rem;margin-bottom:0.75rem;opacity:0.3;}
.et{font-family:'Tajawal',sans-serif;}

footer{text-align:center;padding:2rem 1rem 1rem;color:var(--muted);font-size:0.7rem;font-family:'Tajawal',sans-serif;border-top:1px solid var(--border);margin-top:2.5rem;position:relative;z-index:1;}
footer strong{color:var(--accent);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-ic">🚛</div>
      <div>
        <div class="brand-name">K<span>o</span>rsa</div>
        <div class="brand-sub">دليل المركبات</div>
      </div>
    </div>
    <div class="live"><span class="ldot"></span> متاح</div>
  </div>
  <div class="srch">
    <span class="srch-ic">🔍</span>
    <input id="q" type="text" placeholder="ابحث بالاسم أو الحي أو نوع المركبة..." oninput="render()">
  </div>
</div>

<div class="hoods">
  <div class="hchip on" onclick="setHood('')"              data-h="">كل الأحياء</div>

  <div class="hchip"    onclick="setHood('حي النصر')"     data-h="حي النصر">حي النصر</div>
  <div class="hchip"    onclick="setHood('حي حمادة')"     data-h="حي حمادة">حي حمادة</div>
  <div class="hchip"    onclick="setHood('حي 250')"       data-h="حي 250">حي 250</div>
  <div class="hchip"    onclick="setHood('حي عين فوليس')" data-h="حي عين فوليس">حي عين فوليس</div>
  <div class="hchip"    onclick="setHood('حي السطو')"     data-h="حي السطو">حي السطو</div>
</div>

<div class="stats">
  <div class="stat"><div class="sn" id="s1">12</div><div class="sl">مركبة</div></div>
  <div class="stat"><div class="sn" id="s2">0</div><div class="sl">مسجّل</div></div>
  <div class="stat"><div class="sn" id="s3">6</div><div class="sl">حي</div></div>
</div>

<div class="sec" id="sec-lbl">جميع المركبات</div>
<div id="out"></div>

<footer><strong>Korsa</strong> · دليل المركبات وخدمات النقل<br>للتسجيل تواصل مع المسؤول</footer>

let activeHood = '';
let openCards = new Set();

function setHood(h){
  activeHood=h;
  document.querySelectorAll('.hchip').forEach(c=>c.classList.toggle('on',c.dataset.h===h));
  document.getElementById('sec-lbl').textContent = h?`الأحياء: ${h}`:'جميع المركبات';
  render();
}

function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const filtered=VEHICLES.filter(v=>{
    if(!q) return true;
    return v.name.toLowerCase().includes(q)||
      Object.entries(v.contacts).some(([h,arr])=>h.includes(q)||arr.some(p=>p.name.toLowerCase().includes(q)||p.phone.includes(q)));
  });

  const allPhones=VEHICLES.flatMap(v=>Object.values(v.contacts).flat());
  document.getElementById('s2').textContent=allPhones.length;

  const out=document.getElementById('out');
  if(!filtered.length){
    out.innerHTML=`<div class="empty"><div class="ei">🔎</div><div class="et">لا توجد نتائج</div></div>`;
    return;
  }

  out.innerHTML=`<div class="vlist">${filtered.map((v,i)=>{
    const isOpen=openCards.has(v.id);
    const contacts=activeHood?{[activeHood]:v.contacts[activeHood]||[]}:v.contacts;
    const total=Object.values(contacts).flat().length;

    return `
    <div class="vcard${isOpen?' open':''}" id="vc-${v.id}" style="animation-delay:${Math.min(i*0.05,0.4)}s">
      <div class="vh" onclick="toggle('${v.id}')">
        <div class="vh-img-wrap">
          <img src="${v.img}" alt="${v.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--surface)\'>🚛</div>'">
        </div>
        <div class="vh-body">
          <div>
            <div class="vh-name">${v.name}</div>
            <div class="vh-count">${total>0?`${total} رقم مسجّل`:'لا توجد أرقام بعد'}</div>
          </div>
          <span class="vh-arrow">›</span>
        </div>
      </div>
      <div class="contacts">
        ${total===0?`<div class="no-phones"><span>📭</span>لا توجد أرقام مسجّلة بعد</div>`
        :Object.entries(contacts).filter(([h,arr])=>arr.length>0).map(([hood,arr])=>`
          <div class="hgroup">
            <div class="hg-title">📍 ${hood}</div>
            ${arr.map(p=>`
              <div class="phone-row">
                <div>
                  <div class="pr-name">${p.name}</div>
                  <div class="pr-num">${p.phone}</div>
                </div>
                <a class="call-btn" href="tel:${p.phone}">📞 اتصل</a>
              </div>`).join('')}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function toggle(id){
  if(openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  render();
}

// تحديث البيانات من localStorage
function loadFromStorage() {
  const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const VEHICLES_ORDER = ['harriin','k120','h100','lourd','beton','betonniere','shackman','boukla','clark','rafea','jac','jarrar'];
  VEHICLES_ORDER.forEach(id => {
    const v = VEHICLES.find(x => x.id === id);
    if (v) {
      HOODS.forEach(h => {
        if (stored[id] && stored[id][h]) {
          v.contacts[h] = stored[id][h];
        }
      });
    }
  });
}

loadFromStorage();
render();
// تحديث كل 10 ثوان
setInterval(() => { loadFromStorage(); render(); }, 10000);
</script>
